          <div class="mos-item"><b id="mst-airports">—</b>Airports</div>
          <div class="mos-item"><b id="mst-routes">—</b>Routes</div>
          <div class="mos-item"><b id="mst-block">—</b>Block</div>
        </div>
      </div>
    </div>
    </div>`;

  // Destroy old map if exists
  if (_leafletMap) { _leafletMap.remove(); _leafletMap = null; }

  // Init Leaflet
  _leafletMap = L.map('leafletMap', {
    center: [20, 10],
    zoom: 3,
    zoomControl: true,
    attributionControl: true
  });

  // CartoDB Dark Matter tiles (no API key needed, free)
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://carto.com">CARTO</a> &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
    subdomains: 'abcd',
    maxZoom: 19,
    minZoom: 2
  }).addTo(_leafletMap);

  _mapRange = 'all';
  drawLeafletRoutes();
}

function setMapRange(btn) {
  document.querySelectorAll('#mapFilterBar .ftag').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  _mapRange = btn.getAttribute('data-r');
  drawLeafletRoutes();
}

function getMapCutoff(range) {
  if (range === 'all') return null;
  const c = new Date();
  if (range === '1w') c.setDate(c.getDate() - 7);
  else if (range === '1m') c.setMonth(c.getMonth() - 1);
  else if (range === '3m') c.setMonth(c.getMonth() - 3);
  else if (range === '6m') c.setMonth(c.getMonth() - 6);
  else if (range === '1y') c.setFullYear(c.getFullYear() - 1);
  else if (range === '5y') c.setFullYear(c.getFullYear() - 5);
  return c;
}

function drawLeafletRoutes() {
  if (!_leafletMap) return;

  // Remove old layers
  if (_mapLayers.routes)   { _leafletMap.removeLayer(_mapLayers.routes);   _mapLayers.routes   = null; }
  if (_mapLayers.airports) { _leafletMap.removeLayer(_mapLayers.airports); _mapLayers.airports = null; }

  const cutoff = getMapCutoff(_mapRange);

  // Filter valid flights
  const flights = DB.flights.filter(f => {
    if (f.type === 'simulator') return false;
    const dep = gAP(f.dep), arr = gAP(f.arr);
    if (!dep.code || !arr.code) return false;
    if (!APC[dep.code] || !APC[arr.code]) return false;
    if (dep.code === arr.code) return false;
    if (cutoff) {
      const fd = new Date(dateToISO(f.date) + 'T12:00:00');
      if (fd < cutoff) return false;
    }
    return true;
  });

  // Route frequency map
  const routeFreq = {};
  flights.forEach(f => {
    const dk = gAP(f.dep).code, ak = gAP(f.arr).code;
    const key = [dk, ak].sort().join('–');
    if (!routeFreq[key]) routeFreq[key] = { dep: dk, arr: ak, count: 0, flights: [] };
    routeFreq[key].count++;
    routeFreq[key].flights.push(f);
  });
  const maxFreq = Math.max(...Object.values(routeFreq).map(r => r.count), 1);

  // Airport visit map
  const aptVisits = {};
  flights.forEach(f => {
    [gAP(f.dep).code, gAP(f.arr).code].forEach(code => {
      aptVisits[code] = (aptVisits[code] || 0) + 1;
    });
  });

  // ── Draw routes ────────────────────────────────────────────────────────
  const routeGroup = L.layerGroup();

  Object.values(routeFreq).forEach(r => {
    const dC = APC[r.dep], aC = APC[r.arr];
    if (!dC || !aC) return;

    const alpha = 0.35 + 0.55 * (r.count / maxFreq);
    const weight = 1.2 + 2.5 * (r.count / maxFreq);
    const color  = `rgba(100,200,255,${alpha.toFixed(2)})`;

    // Great-circle interpolation (20 segments)
    const latlngs = [];
    const n = 20;
    for (let i = 0; i <= n; i++) {
      const t = i / n;
      // Spherical interpolation for more accurate great circle
      const lat1 = dC.lat * Math.PI / 180, lon1 = dC.lng * Math.PI / 180;
      const lat2 = aC.lat * Math.PI / 180, lon2 = aC.lng * Math.PI / 180;
      const d = 2 * Math.asin(Math.sqrt(
        Math.sin((lat2 - lat1) / 2) ** 2 +
        Math.cos(lat1) * Math.cos(lat2) * Math.sin((lon2 - lon1) / 2) ** 2
      ));
      let lat, lng;
      if (d < 0.0001) { lat = dC.lat; lng = dC.lng; }
      else {
        const A = Math.sin((1 - t) * d) / Math.sin(d);
        const B = Math.sin(t * d) / Math.sin(d);
        const x = A * Math.cos(lat1) * Math.cos(lon1) + B * Math.cos(lat2) * Math.cos(lon2);
        const y = A * Math.cos(lat1) * Math.sin(lon1) + B * Math.cos(lat2) * Math.sin(lon2);
        const z = A * Math.sin(lat1) + B * Math.sin(lat2);
        lat = Math.atan2(z, Math.sqrt(x * x + y * y)) * 180 / Math.PI;
        lng = Math.atan2(y, x) * 180 / Math.PI;
      }
      latlngs.push([lat, lng]);
    }

    const line = L.polyline(latlngs, {
      color: '#64C8FF',
      weight: weight,
      opacity: alpha,
      smoothFactor: 1,
      lineCap: 'round',
      lineJoin: 'round'
    });

    // Popup on click
    const depName = (APCity[r.dep] || '').split(',')[0] || r.dep;
    const arrName = (APCity[r.arr] || '').split(',')[0] || r.arr;
    const totalFlight = r.flights.reduce((s, f) => s + (f.flight || 0), 0);
    line.bindPopup(`
      <div class="pop-route">${r.dep} → ${r.arr}</div>
      <div class="pop-sub">${depName} → ${arrName}</div>
      <div style="margin-top:6px;display:flex;gap:12px">
        <span style="color:#4F9EFF;font-weight:600">${r.count}×</span>
        <span style="color:#7A7A90">${fmtH(totalFlight)} total</span>
      </div>`, { className: '' });

    routeGroup.addLayer(line);
  });

  _mapLayers.routes = routeGroup;
  routeGroup.addTo(_leafletMap);

  // ── Draw airport markers ───────────────────────────────────────────────
  const aptGroup = L.layerGroup();

  Object.entries(aptVisits).forEach(([code, visits]) => {
    const c = APC[code];
    if (!c) return;

    const r = Math.min(4 + visits * 0.8, 10);
    const marker = L.circleMarker([c.lat, c.lng], {
      radius: r,
      fillColor: '#4F9EFF',
      fillOpacity: 0.9,
      color: '#1a4a8a',
      weight: 2
    });

    const name  = APName[code] || code;
    const city  = (APCity[code] || '').split(',')[0] || '';
    const country = (APCity[code] || '').split(',')[1]?.trim() || '';
    marker.bindPopup(`
      <div class="pop-code">${code}</div>
      <div style="color:#EEEEF2;font-size:14.5px">${name}</div>
      <div class="pop-sub">${city}${country ? ', ' + country : ''}</div>
      <div style="margin-top:6px;color:#4F9EFF;font-weight:600">${visits} visit${visits > 1 ? 's' : ''}</div>`,
      { className: '' });

    // Add a permanent label with airport code + name below marker
    const labelIcon = L.divIcon({
      className: '',
      html: `<div style="color:#4F9EFF;font-size:10px;font-weight:700;white-space:nowrap;text-shadow:0 1px 3px #000,0 0 6px #000;margin-top:2px;line-height:1.2">${code}<br><span style="color:#9ab8d8;font-size:9px;font-weight:400">${city||name}</span></div>`,
      iconAnchor: [-6, 0]
    });
    L.marker([c.lat, c.lng], { icon: labelIcon, interactive: false }).addTo(aptGroup);

    aptGroup.addLayer(marker);
  });

  _mapLayers.airports = aptGroup;
  aptGroup.addTo(_leafletMap);

  // ── Update overlay stats ───────────────────────────────────────────────
  const totalBlock = flights.reduce((s, f) => s + (f.block || 0), 0);
  const uniqueRoutes = Object.keys(routeFreq).length;
  const uniqueApts = Object.keys(aptVisits).length;

  const setStat = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
  setStat('mst-flights',  flights.length);
  setStat('mst-airports', uniqueApts);
  setStat('mst-routes',   uniqueRoutes);
  setStat('mst-block',    fmtH(totalBlock));

  // Auto-fit bounds if there are routes
  if (flights.length > 0) {
    const coords = Object.keys(aptVisits)
      .filter(c => APC[c])
      .map(c => [APC[c].lat, APC[c].lng]);
    if (coords.length > 1) {
      try { _leafletMap.fitBounds(L.latLngBounds(coords), { padding: [40, 40] }); }
      catch(e) {}
    }
  }
}

/* ============================================================
   FILE SYNC  —  Live link to a local .json database file
   Uses File System Access API (Chrome/Edge 86+)
   ============================================================ */
let _syncFileHandle = null;
let _syncEnabled    = false;
let _syncStatus     = 'idle'; // 'idle' | 'linked' | 'saving' | 'error'
let _syncLastSave   = null;
let _syncAutoSave   = null;

function setSyncStatus(s, msg){
  _syncStatus=s;
  const dot=document.getElementById('syncDot');
  const lbl=document.getElementById('syncStatusLbl');
  const sub=document.getElementById('syncStatusSub');
  const colors={idle:'var(--di)',linked:'var(--gr)',saving:'var(--am)',error:'var(--rd)'};
  if(dot) dot.style.background=colors[s]||'var(--di)';
  if(lbl) lbl.textContent={idle:'Not linked',linked:'Linked',saving:'Saving…',error:'Error'}[s]||s;
  if(sub&&msg) sub.textContent=msg;
}

function dbToJSON(){
  return JSON.stringify({
    _version:1,
    _saved:new Date().toISOString(),
    flights:DB.flights,
    aircraft:DB.aircraft,
    airports:DB.airports,
    crew:DB.crew,
    _id:DB._id
  },null,2);
}

function dbFromJSON(txt){
  try{
    const d=JSON.parse(txt);
    if(!d.flights||!Array.isArray(d.flights))throw new Error('Invalid format');
    DB.flights=d.flights||[];
    DB.aircraft=d.aircraft||[];
    DB.airports=d.airports||[];
    DB.crew=d.crew||[];
    if(d._id){DB._id=d._id;}else{
      const maxId=(arr,pfx)=>{let m=1;arr.forEach(x=>{if(x.id&&x.id.startsWith(pfx)){const n=parseInt(x.id.split('_')[1]);if(!isNaN(n)&&n>=m)m=n+1;}});return m;};
      DB._id.f=maxId(DB.flights,'f');
      DB._id.a=maxId(DB.aircraft,'a');
      DB._id.ap=maxId(DB.airports,'ap');
      DB._id.c=maxId(DB.crew,'c');
    }
    _rebuildMaps(); _dateISOCache.clear();
    return true;
  }catch(e){return false;}
}

async function syncSaveNow(){
  if(!_syncFileHandle||!_syncEnabled)return;
  setSyncStatus('saving');
  try{
    const writable=await _syncFileHandle.createWritable();
    await writable.write(dbToJSON());
    await writable.close();
    _syncLastSave=new Date();
    const msg='File: '+_syncFileHandle.name+' · Last saved: '+_syncLastSave.toLocaleTimeString();
    setSyncStatus('linked',msg);
    const el=document.getElementById('syncStatusSub');
    if(el)el.textContent=msg;
  }catch(e){
    setSyncStatus('error','Save failed: '+e.message);
  }
}

function scheduleSyncSave(){
  if(!_syncEnabled)return;
  if(_syncAutoSave)clearTimeout(_syncAutoSave);
  _syncAutoSave=setTimeout(syncSaveNow,800);
}

// DB mutation → auto-save is handled inline in saveE, delE, bulkDelete
const _patchSave=()=>scheduleSyncSave();

async function syncLinkFile(){
  if(!window.showOpenFilePicker){alert('File System Access API not supported.\nUse Chrome or Edge 86+.');return;}
  try{
    const [handle]=await window.showOpenFilePicker({
      types:[{description:'AeroLog Database',accept:{'application/json':['.json'],'text/plain':['.json']}}],
      multiple:false
    });
    _syncFileHandle=handle;
    const file=await handle.getFile();
    const txt=await file.text();
    if(txt.trim()){
      const ok=dbFromJSON(txt);
      if(!ok){if(!confirm('File is not a valid AeroLog database.\nOverwrite with current data?'))return;}
      else{updSb();if(CP==='logbook')renderLog();}
    }
    _syncEnabled=true;
    setSyncStatus('linked','File: '+handle.name);
    renderFileSync();
    scheduleSyncSave();
  }catch(e){if(e.name!=='AbortError')setSyncStatus('error',e.message);}
}

async function syncNewFile(){
  if(!window.showSaveFilePicker){alert('File System Access API not supported.\nUse Chrome or Edge 86+.');return;}
  try{
    const handle=await window.showSaveFilePicker({
      suggestedName:'aerolog_database.json',
      types:[{description:'AeroLog Database',accept:{'application/json':['.json']}}]
    });
    _syncFileHandle=handle;
    _syncEnabled=true;
    await syncSaveNow();
    setSyncStatus('linked','File: '+handle.name);
    renderFileSync();
  }catch(e){if(e.name!=='AbortError')setSyncStatus('error',e.message);}
}

function syncUnlink(){
  _syncFileHandle=null;_syncEnabled=false;
  if(_syncAutoSave){clearTimeout(_syncAutoSave);_syncAutoSave=null;}
  setSyncStatus('idle');renderFileSync();
}

      <div style="padding:16px">
        <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:var(--rs);margin-bottom:14px">
          <div style="width:9px;height:9px;border-radius:50%;background:${linked?'var(--gr)':_syncStatus==='error'?'var(--rd)':'var(--di)'};flex-shrink:0"></div>
          <div style="flex:1">

            <div style="font-size:12px;color:var(--mu);margin-top:2px" id="syncStatusSub">${linked?'File: '+_syncFileHandle.name+(_syncLastSave?' · Last saved: '+_syncLastSave.toLocaleTimeString():''):'No file linked yet.'}</div>

function handleJsonUpload(input){
  const f = input.files && input.files[0];
  if(!f) return;
  processJsonFile(f);
  input.value = ''; // reset so same file can be re-selected
}

let _pendingJsonImport = null;

function processJsonFile(file){
  const reader = new FileReader();
  reader.onload = function(e){
    const txt = e.target.result;
    let parsed;
    try { parsed = JSON.parse(txt); } catch(err){
      showJsonStatus('error','⚠ Invalid file — could not parse JSON.');
      return;
    }
    if(!parsed.flights || !Array.isArray(parsed.flights)){
      showJsonStatus('error','⚠ This does not look like an AeroLog backup file.');
      return;
    }
    const flightCount = parsed.flights.length;
    _pendingJsonImport = txt;
    const mo=document.createElement('div');
    mo.className='ov';
    const confirmBtn=document.createElement('button');
    confirmBtn.className='btn bp';
    confirmBtn.textContent='Import '+flightCount+' Flight'+(flightCount!==1?'s':'');
    confirmBtn.onclick=function(){confirmJsonImport();};
    const cancelBtn=document.createElement('button');
    cancelBtn.className='btn bg2';
    cancelBtn.textContent='Cancel';
    cancelBtn.onclick=function(){mo.remove();_pendingJsonImport=null;};
    mo.innerHTML=`<div class="mo" style="max-width:400px">
      <div class="mh"><span class="mt">Import JSON Backup</span><button class="mx" onclick="this.closest('.ov').remove()">✕</button></div>
      <div class="mb">
        <div style="font-size:14px;color:var(--mu);line-height:1.8;margin-bottom:16px">
          Found <b style="color:var(--tx)">${flightCount} flight${flightCount!==1?'s':''}</b> in this file.<br>
          <span style="color:var(--rd)">This will replace your current logbook data.</span>
        </div>
        <div id="jsonConfirmBtns" style="display:flex;gap:8px;justify-content:flex-end"></div>
      </div></div>`;
    document.body.appendChild(mo);
    document.getElementById('jsonConfirmBtns').appendChild(cancelBtn);
    document.getElementById('jsonConfirmBtns').appendChild(confirmBtn);
  };
  reader.onerror = ()=>showJsonStatus('error','⚠ Could not read file.');
  reader.readAsText(file);
}

function confirmJsonImport(){
  document.querySelectorAll('.ov').forEach(el=>el.remove());
  if(!_pendingJsonImport){return;}
  const ok = dbFromJSON(_pendingJsonImport);
  _pendingJsonImport = null;
  if(ok){
    lsSave();
    updSb();
    showJsonStatus('ok','✓ Import successful — ' + DB.flights.length + ' flights loaded.');
    if(CP==='logbook') renderLog();
  } else {
    showJsonStatus('error','⚠ Import failed — file format not recognised.');
  }
}

function showJsonStatus(type, msg){
  const el = document.getElementById('jsonImportStatus');
  if(!el) return;
  el.style.display = 'block';
  if(type==='ok'){
    el.style.background = 'rgba(80,240,144,0.1)';
    el.style.border = '1px solid rgba(80,240,144,0.25)';
    el.style.color = 'var(--gr)';
  } else {
    el.style.background = 'rgba(255,107,107,0.1)';
    el.style.border = '1px solid rgba(255,107,107,0.25)';
    el.style.color = 'var(--rd)';
  }
  el.textContent = msg;
}

// ── FLIGHT CARD HOVER PREVIEW ─────────────────────────────────────────
(function(){
  let tip=null, timer=null;
  function ensureTip(){
    if(!tip){tip=document.createElement('div');tip.className='fc-preview';document.body.appendChild(tip);}
    return tip;
  }
  function showPreview(el, id, x, y){
    const r=DB.flights.find(f=>f.id===id);
    if(!r)return;
    const dep=gAP(r.dep),arr=gAP(r.arr),ac=gAC(r.acId);
    const depDisp=r.type==='simulator'?(r.simDevice||'SIM'):(dep.icao||dep.code||r.dep||'?');
    const arrDisp=r.type==='simulator'?(r.simType||'SIM'):(arr.icao||arr.code||r.arr||'?');
    const blockT=r.out&&r.in?fmtH(timeDiff(r.out,r.in)):(r.block?fmtH(r.block):'—');
    const flightT=r.off&&r.on?fmtH(timeDiff(r.off,r.on)):(r.flight?fmtH(r.flight):'—');
    const acLabel=r.type==='simulator'?(r.simType||'Simulator'):(ac.model?`${ac.model}${ac.tail?' · '+ac.tail:''}`:(ac.tail||'—'));
    const lands=(r.dayLand||0)+(r.nightLand||0);
    const crew=[r.pic>0?'PIC':null,r.sic>0?'SIC':null,r.instructor>0?'INS':null].filter(Boolean).join(' · ')||'—';
    const accentColor=r.type==='simulator'?'var(--am)':r.type==='deadhead'?'var(--pu)':'var(--cy)';
    const t=ensureTip();
    t.innerHTML=`
      <div class="fc-preview-route" style="color:${accentColor}">${depDisp} → ${arrDisp}</div>
      <div class="fc-preview-date">${fmtDateDisplay(r.date)}${r.flightNum?' · '+r.flightNum:''}</div>
      <div class="fc-preview-divider"></div>
      <div class="fc-preview-row"><span class="fc-preview-lbl">Aircraft</span><span class="fc-preview-val">${acLabel}</span></div>
      <div class="fc-preview-row"><span class="fc-preview-lbl">Block</span><span class="fc-preview-val">${blockT}</span></div>
      <div class="fc-preview-row"><span class="fc-preview-lbl">Flight</span><span class="fc-preview-val">${flightT}</span></div>
      ${lands?`<div class="fc-preview-row"><span class="fc-preview-lbl">Landings</span><span class="fc-preview-val">${lands}</span></div>`:''}
      <div class="fc-preview-row"><span class="fc-preview-lbl">Role</span><span class="fc-preview-val">${crew}</span></div>
      ${r.night>0?`<div class="fc-preview-row"><span class="fc-preview-lbl">Night</span><span class="fc-preview-val">${fmtH(r.night)}</span></div>`:''}
      ${r.ifr>0?`<div class="fc-preview-row"><span class="fc-preview-lbl">IFR</span><span class="fc-preview-val">${fmtH(r.ifr)}</span></div>`:''}
      ${r.remarks?`<div class="fc-preview-notes">${r.remarks}</div>`:''}
    `;
    const W=window.innerWidth,H=window.innerHeight;
    t.style.left=Math.min(x+14,W-300)+'px';
    t.style.top=(y+28+240>H?y-240:y+28)+'px';
    t.classList.add('show');
  }
  function hide(){
    clearTimeout(timer);timer=null;
    if(tip)tip.classList.remove('show');
  }
  document.addEventListener('mouseover',e=>{
    const card=e.target.closest('.fc[onclick]');
    if(!card)return;
    const id=card.getAttribute('onclick')?.match(/'([^']+)'\)$/)?.[1];
    if(!id)return;
    clearTimeout(timer);
    timer=setTimeout(()=>showPreview(card,id,e.clientX,e.clientY),500);
  });
  document.addEventListener('mousemove',e=>{
    if(!tip||!tip.classList.contains('show'))return;
    const W=window.innerWidth,H=window.innerHeight;
    tip.style.left=Math.min(e.clientX+14,W-300)+'px';
    tip.style.top=(e.clientY+28+240>H?e.clientY-240:e.clientY+28)+'px';
  });
  document.addEventListener('mouseout',e=>{
    const card=e.target.closest('.fc[onclick]');
    if(card&&!card.contains(e.relatedTarget)){hide();}
  });
  document.addEventListener('click',hide);
})();

function doSnapshotDownload(){
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(dbToJSON());
  a.download='aerolog_snapshot_'+new Date().toISOString().split('T')[0]+'.json';
  a.click();
}

// ── localStorage persistence ──────────────────────────────────────────
const LS_KEY = 'aerolog_db_v1';
const LS_SYNC_NAME = 'aerolog_sync_name_v1';

function lsSave() {
  try { localStorage.setItem(LS_KEY, dbToJSON()); } catch(e) { console.warn('localStorage save failed:', e); }
}

function lsLoad() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) dbFromJSON(raw);
  } catch(e) { console.warn('localStorage load failed:', e); }
}

// ── Auto-reconnect to previously linked database file ────────────────
async function autoReconnect() {
  if (!window.showOpenFilePicker) return;
  const savedName = localStorage.getItem(LS_SYNC_NAME);
  if (!savedName) return;
  const banner = document.createElement('div');
  banner.id = 'autoreconnect-banner';
  banner.style.cssText = 'position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:9999;background:rgba(20,20,30,0.92);border:1px solid rgba(96,184,255,0.35);border-radius:14px;padding:12px 20px;display:flex;align-items:center;gap:14px;backdrop-filter:blur(40px);box-shadow:0 8px 40px rgba(0,0,0,0.7);font-family:Outfit,sans-serif;font-size:13.5px;color:#F5F5F5;white-space:nowrap;';
  banner.innerHTML = '<span style="color:rgba(255,255,255,0.5)">&#128190; Last session: <b style="color:#F5F5F5">'+savedName+'</b></span>'
    +'<button class="btn bp" style="font-size:12.5px;padding:5px 12px" onclick="doAutoReconnect()">Reconnect</button>'
    +'<button class="btn bg2" style="font-size:12.5px;padding:5px 10px" onclick="dismissReconnect()">&#10005;</button>';
  document.body.appendChild(banner);
}

async function doAutoReconnect() {
  const banner = document.getElementById('autoreconnect-banner');
  if (banner) banner.remove();
  if (!window.showOpenFilePicker) return;
  try {
    const [handle] = await window.showOpenFilePicker({
      types:[{description:'AeroLog Database',accept:{'application/json':['.json'],'text/plain':['.json']}}],
      multiple:false
    });
    _syncFileHandle = handle;
    const file = await handle.getFile();
    const txt = await file.text();
    if (txt.trim()) {
      const ok = dbFromJSON(txt);
      if (ok) { updSb(); if(CP==='logbook') renderLog(); }
    }
    _syncEnabled = true;
    localStorage.setItem(LS_SYNC_NAME, handle.name);
    setSyncStatus('linked', 'File: ' + handle.name);
    scheduleSyncSave();
  } catch(e) { if (e.name !== 'AbortError') setSyncStatus('error', e.message); }
}

function dismissReconnect() {
  const banner = document.getElementById('autoreconnect-banner');
  if (banner) banner.remove();
  localStorage.removeItem(LS_SYNC_NAME);
}

// Patch sync functions to persist/clear file name for auto-reconnect
const _origSyncLinkFile = syncLinkFile;
syncLinkFile = async function() {
  await _origSyncLinkFile();
  if (_syncFileHandle) localStorage.setItem(LS_SYNC_NAME, _syncFileHandle.name);
};
const _origSyncNewFile = syncNewFile;
syncNewFile = async function() {
  await _origSyncNewFile();
  if (_syncFileHandle) localStorage.setItem(LS_SYNC_NAME, _syncFileHandle.name);
};
const _origSyncUnlink = syncUnlink;
syncUnlink = function() {
  _origSyncUnlink();
  localStorage.removeItem(LS_SYNC_NAME);
};

  document.body.appendChild(mo);
}

function confirmClearAll() {
  document.querySelectorAll('.ov').forEach(el=>el.remove());
  DB.flights=[]; DB.aircraft=[]; DB.airports=[]; DB.crew=[];
  DB._id={f:1,a:1,ap:1,c:1};
  lsSave();
  if (_syncEnabled) scheduleSyncSave();
  updSb();
  gp('logbook');
}

lsLoad();_rebuildMaps();
updSb();renderLog();
